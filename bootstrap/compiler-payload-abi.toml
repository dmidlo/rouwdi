[[artifact_routes]]
route = "wasm32_wasip1_module"
artifact_format = "wasm_module"
target_triple = "wasm32-wasip1"
crate_path = "crates/rouwdi-compiler-payload-abi"
command = "cargo build -p rouwdi-compiler-payload-abi --target wasm32-wasip1 --release"
attempted = true
status = "shim_emitted_bridge_attempted_blocked"
artifact_path = "target/wasm32-wasip1/release/rouwdi_compiler_payload_abi.wasm"
artifact_sha256 = "c6c4137b52f718bce4aaced57545e48125468abdc94c239c52aa67250e38a16f"
artifact_size_bytes = 1364
bridge_required = true
bridge_status = "attempted_blocked"
blocker_kind = "bootstrap_target_pack_missing_for_wasm_payload"
loadable_as_full_payload = false
exact_blocker = "The thin ABI shim is the selected route and exposes the v1 symbols without fabricating MIR. The first real bridge attempt consumed the bootstrap MIR adapter rlib identity and tried to compile the rustc-private adapter toward wasm32-wasip1, but the bootstrap sysroot lacks the wasm32-wasip1 std target pack, so no bridge output is loadable."

