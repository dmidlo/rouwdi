schema_version = 1
abi_name = "rouwdi.compiler-payload.mir-handoff"
abi_version = 1
abi_status = "defined"
supported_stage = "mir_handoff"
primary_format = "wasm_module"
supported_formats = ["wasm_module", "wasm_component"]
selected_route = "wasm32_wasip1_module"
symbol_prefix = "rouwdi_"

[payload_identity]
kind = "compiler_payload"
name = "rouwdi-mir-handoff-payload"
abi_id = "rouwdi.compiler-payload.mir-handoff.v1"
purpose = "MIR handoff from rouwdi compiler orchestration into an upstream rustc-backed payload"

[required_upstream]
components = [
  "rustc_middle",
  "rustc_mir_build",
  "rustc_session",
  "rustc_hir",
  "rustc_span",
]
type_surface = [
  "rustc_middle::mir::Body<'tcx>",
  "rustc_middle::ty::TyCtxt<'tcx>",
  "rustc_middle::query::Providers",
  "rustc_middle::util::Providers",
  "rustc_session::Session",
  "rustc_hir::def_id::LocalDefId",
  "rustc_span::def_id::LocalDefId",
]
provider_surface = [
  "rustc_mir_build::provide(&mut rustc_middle::util::Providers)",
  "rustc_middle::hooks::Providers::build_mir_inner_impl",
]

[input_contract]
shape = "MirHandoffInputV1"
encoding = "json_bytes_in_wasm_linear_memory"
ownership = "caller-owned input bytes"
required_fields = [
  "contract_hash",
  "source_snapshot_hash",
  "compile_unit_id",
  "package",
  "target",
  "target_kind",
  "triple",
  "profile",
  "source_path",
  "upstream_context_handle",
]
notes = "The v1 ABI does not serialize or fabricate TyCtxt, Providers, or MIR Body. upstream_context_handle is opaque until the rustc-private bridge exists."

[output_contract]
shape = "MirHandoffOutputV1"
encoding = "json_bytes_in_wasm_linear_memory"
ownership = "payload-owned output bytes valid until next payload call"
required_fields = [
  "compile_unit_id",
  "stage",
  "mir_body_identity",
  "mir_body_hash",
  "provider_identity",
  "proof_metadata",
]
notes = "The ABI shim must not emit this output until real rustc MIR is available through the bridge."

[error_contract]
shape = "MirHandoffErrorV1"
encoding = "json_bytes_in_wasm_linear_memory"
ownership = "payload-owned error bytes valid until next payload call"
required_fields = [
  "code",
  "kind",
  "message",
  "blocker_kind",
  "blocker_component",
]
known_codes = [
  "real_mir_payload_not_executable_yet",
  "bootstrap_target_pack_missing_for_wasm_payload",
  "invalid_input_contract",
  "unsupported_abi_version",
  "upstream_context_unavailable",
  "internal_payload_error",
]

[proof_metadata]
emitted_fields = [
  "abi_name",
  "abi_version",
  "payload_identity",
  "selected_route",
  "route_artifact_hash",
  "required_upstream_components",
  "rustc_private_bridge_status",
  "input_contract_hash",
  "output_contract_hash",
]
hash_scope = [
  "compiler-payload ABI manifest",
  "selected ABI artifact",
  "rustc-private MIR payload rlib",
  "rmeta metadata artifact",
  "required upstream component list",
]

[versioning]
compatibility = "major_version_exact"
major = 1
minor = 0
patch = 0
rule = "A rouwdi.wasm loader must reject a payload when abi_version differs from the exact major version it implements. Minor fields may be added only when unknown fields are ignorable and all required v1 symbols remain present."

[bridge]
rustc_private_payload = "third_party/rust/src/tools/rouwdi-mir-adapter-probe"
rustc_private_artifact_format = "rlib"
strategy = "compile_rustc_private_mir_adapter_to_wasm32_wasip1_under_bootstrap"
command_attempted = "C:\\rouwdi\\third_party\\rust\\build\\x86_64-pc-windows-msvc\\stage0\\bin\\cargo.exe build --manifest-path C:\\rouwdi\\third_party\\rust\\src\\tools\\rouwdi-mir-adapter-probe\\Cargo.toml --target wasm32-wasip1 --release --message-format short"
command_exit_code = 1
command_evidence = "error[E0463]: can't find crate for `std`"
target_triple = "wasm32-wasip1"
status = "attempted_blocked"
blocker_kind = "bootstrap_target_pack_missing_for_wasm_payload"
blocker_reason = "The first bridge attempt used the real bootstrap MIR adapter crate as input and targeted wasm32-wasip1 through the bootstrap stage0 cargo/rustc. The compile failed before rustc_private linking because the bootstrap sysroot has no wasm32-wasip1 std target pack available. The x.py control command with --target wasm32-wasip1 exited 0 but remained host-bound and emitted only the x86_64-pc-windows-msvc stage1 rlib, so it did not produce a Wasm bridge payload."
exact_blocker = "Direct bridge command exited 1 with `error[E0463]: can't find crate for std` while compiling third_party/rust/src/tools/rouwdi-mir-adapter-probe for wasm32-wasip1. The selected strategy is real and consumes the rustc-private adapter boundary, but no output artifact is produced until the bootstrap wasm32-wasip1 target pack exists and the bridge build is no longer host-bound."
next_command = "python x.py build library/std --stage 1 --target wasm32-wasip1 -v"

[[bridge.commands_attempted]]
command = "python x.py build src/tools/rouwdi-mir-adapter-probe --stage 1 --target wasm32-wasip1 -v"
workdir = "third_party/rust"
exit_code = 0
classification = "host_bound_no_wasm_output"
evidence = "Build completed successfully, but the bootstrap log built stage1 rouwdi_mir_adapter_probe for x86_64-pc-windows-msvc and no wasm32-wasip1 bridge artifact appeared under third_party/rust/build."

[[bridge.commands_attempted]]
command = "C:\\rouwdi\\third_party\\rust\\build\\x86_64-pc-windows-msvc\\stage0\\bin\\cargo.exe build --manifest-path C:\\rouwdi\\third_party\\rust\\src\\tools\\rouwdi-mir-adapter-probe\\Cargo.toml --target wasm32-wasip1 --release --message-format short"
workdir = "third_party/rust"
exit_code = 1
classification = "bootstrap_target_pack_missing"
evidence = "error[E0463]: can't find crate for `std`; error: could not compile `rouwdi-mir-adapter-probe` (lib) due to 1 previous error"

