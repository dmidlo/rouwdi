schema_version = 1
abi_name = "rouwdi.compiler-payload.mir-handoff"
abi_version = 1
abi_status = "defined"
supported_stage = "mir_handoff"
primary_format = "wasm_module"
supported_formats = ["wasm_module", "wasm_component"]
selected_route = "wasm32_wasip1_module"
milestone_state = "bridge_wasm_source_map_created_blocked_at_rustc_parse_not_linked"
symbol_prefix = "rouwdi_"

[upstream_context_handle_v1]
selected_strategy = "payload_owned_context"
owner = "payload"
scope = "payload-local"
refers_to = [
  "The current bridge execution owns a rustc_span::SourceMap and interned source file created from the MIR handoff source input.",
  "Future ParseSess, Session, Providers, TyCtxt, LocalDefId, and MIR Body objects must be created and retained inside the same payload Wasm instance.",
]
lifetime_rules = "Opaque handle values are valid only inside one payload Wasm instance and one execution epoch; they expire after the payload resets or the Wasm instance is dropped."
invalid_handle_behavior = "The payload returns invalid_input_contract or a precise context_handle_invalid/context_blocked error. It must not dereference, deserialize, or trust raw Rust pointers from ABI input."
proof_identity = "The handle proof identity is derived from the ABI manifest hash, payload artifact hash, source snapshot hash, compile_unit_id, source_path, and selected strategy; no raw address identity crosses the ABI."
opaque = true
serializable = false
may_cross_wasm_instance_boundaries = false
raw_pointers_allowed = false

[wasm_runtime_execution]
tool_command = "cargo run -p rouwdi-rustc-upstream --bin mir-payload-loader -- --json"
artifact_sha256 = "d6eeb372de7f547e524af263a432464fac9f33c106ea89349b64362c88fae687"
module_instantiated = true
abi_exports_called = true
descriptor_bytes_read = true
valid_input_bytes_read = true
execute_called = true
output_or_error_bytes_read = true
classification = "source_map_created_context_blocked_at_rustc_parse_not_linked"
context_state = "source_map_created_context_blocked_at_rustc_parse_not_linked"
blocker_kind = "rustc_parse_not_linked"
exact_blocker = "Wasmtime instantiated the bridge module, verified the artifact hash and ABI v1 exports, called version/stage/descriptor/valid-input/execute, read error bytes from Wasm memory, and the payload attempted rustc_span::SourceMap::new_source_file before blocking because rustc_parse/ParseSess is not linked into the current runtime execution payload."

[payload_identity]
kind = "compiler_payload"
name = "rouwdi-mir-handoff-payload"
abi_id = "rouwdi.compiler-payload.mir-handoff.v1"
purpose = "MIR handoff from rouwdi compiler orchestration into an upstream rustc-backed payload"

[required_upstream]
components = [
  "rustc_middle",
  "rustc_mir_build",
  "rustc_session",
  "rustc_hir",
  "rustc_span",
]
type_surface = [
  "rustc_middle::mir::Body<'tcx>",
  "rustc_middle::ty::TyCtxt<'tcx>",
  "rustc_middle::query::Providers",
  "rustc_middle::util::Providers",
  "rustc_session::Session",
  "rustc_hir::def_id::LocalDefId",
  "rustc_span::def_id::LocalDefId",
]
provider_surface = [
  "rustc_mir_build::provide(&mut rustc_middle::util::Providers)",
  "rustc_middle::hooks::Providers::build_mir_inner_impl",
]

[input_contract]
shape = "MirHandoffInputV1"
encoding = "json_bytes_in_wasm_linear_memory"
ownership = "caller-owned input bytes"
required_fields = [
  "contract_hash",
  "source_snapshot_hash",
  "compile_unit_id",
  "package",
  "target",
  "target_kind",
  "triple",
  "profile",
  "source_path",
  "upstream_context_handle",
]
notes = "UpstreamContextHandleV1 is opaque and payload-local. The v1 ABI does not serialize or fabricate TyCtxt, Providers, Body<'tcx>, MIR, raw Rust pointers, or references."

[output_contract]
shape = "MirHandoffOutputV1"
encoding = "json_bytes_in_wasm_linear_memory"
ownership = "payload-owned output bytes valid until next payload call"
required_fields = [
  "compile_unit_id",
  "stage",
  "mir_body_identity",
  "mir_body_hash",
  "provider_identity",
  "proof_metadata",
]
notes = "The payload must not emit this output until real upstream rustc MIR is available through the bridge."

[error_contract]
shape = "MirHandoffErrorV1"
encoding = "json_bytes_in_wasm_linear_memory"
ownership = "payload-owned error bytes valid until next payload call"
required_fields = [
  "code",
  "kind",
  "message",
  "blocker_kind",
  "blocker_component",
]
known_codes = [
  "real_mir_payload_not_executable_yet",
  "bootstrap_target_pack_missing_for_wasm_payload",
  "llvm_wasm32_wasip1_sysroot_missing_machine_endian",
  "invalid_input_contract",
  "unsupported_abi_version",
  "rustc_parse_not_linked",
  "internal_payload_error",
]

[proof_metadata]
emitted_fields = [
  "abi_name",
  "abi_version",
  "payload_identity",
  "selected_route",
  "route_artifact_hash",
  "required_upstream_components",
  "rustc_private_bridge_status",
  "input_contract_hash",
  "output_contract_hash",
]
hash_scope = [
  "compiler-payload ABI manifest",
  "selected ABI artifact",
  "rustc-private MIR payload rlib",
  "rmeta metadata artifact",
  "required upstream component list",
]

[versioning]
compatibility = "major_version_exact"
major = 1
minor = 0
patch = 0
rule = "A rouwdi.wasm loader must reject a payload when abi_version differs from the exact major version it implements. Minor fields may be added only when unknown fields are ignorable and all required v1 symbols remain present."

[bridge]
rustc_private_payload = "third_party/rust/src/tools/rouwdi-mir-adapter-probe"
rustc_private_artifact_format = "wasm_module"
strategy = "direct_wasm32_wasip1_rustc_private_pack_without_stage2_wasm_host_llvm"
