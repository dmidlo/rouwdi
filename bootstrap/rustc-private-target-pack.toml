[target_loadable_resolution]
selected_strategy = "direct_wasm32_wasip1_rustc_private_pack_without_stage2_wasm_host_llvm"
rejected_strategies = [
  "building_with_xpy_target: produced host compiler artifacts, not wasm32-wasip1 target artifacts",
  "passing_explicit_extern_host_paths: rejected because host x86_64-pc-windows-msvc rlibs are not target-loadable Wasm",
  "copying_host_artifacts_to_target_pack: forbidden because no command proved target compatibility",
  "direct_cargo_stage1_rustc: failed before rustc_span because build-script dependencies could not find host core/std in the stage1 sysroot",
  "xpy_stage1_host_wasm32_wasip1: rejected by bootstrap because stage0 cannot build wasm32-wasip1 std for a wasm host compiler",
  "xpy_stage2_host_wasm32_wasip1: blocked after repo-local Ninja/CMake/WASI tool paths by LLVM-for-wasm32-wasip1 C++ compilation against a WASI sysroot missing machine/endian.h",
]
target_sysroot_path = "third_party/rust/build/x86_64-pc-windows-msvc/stage1"
target_libdir_path = "third_party/rust/build/x86_64-pc-windows-msvc/stage1/lib/rustlib/wasm32-wasip1/lib"
target_rustc_private_artifact_count = 538
host_artifact_dir = "third_party/rust/build/x86_64-pc-windows-msvc/stage1-rustc/x86_64-pc-windows-msvc/release"
exact_blocker = "The direct pack now contains target-loadable wasm32-wasip1 rustc-private rlibs for the required MIR bridge roots and their target-loadable non-proc-macro closure, including rustc_expand, rustc_resolve, rustc_interface, rustc_hir_analysis, rustc_query_impl, rustc_passes, rustc_lint, rustc_builtin_macros, rustc_parse, and rustc_session for the context path. Host proc-macro crates are recorded as host artifacts and are not relabeled. The remaining blocker is not target-pack construction; the executed bridge reaches TyCtxt and HIR lowering and stops at lang-item/core setup before TyCtxt::optimized_mir."

[fallback_architecture]
selected = "direct_wasm32_wasip1_rustc_private_pack_without_stage2_wasm_host_llvm"
status = "completed"
reason = "The stage2 wasm-host route tries to build an LLVM host library for wasm32-wasip1 and is blocked by LLVM C++ portability against the WASI sysroot before rustc-private crates are emitted. The next route must avoid building a full wasm-host rustc and instead construct only the rustc-private root closure required by the MIR adapter as a target pack."
must_not_do = [
  "relabel host x86_64-pc-windows-msvc rlibs as wasm32-wasip1",
  "copy host rustc-private artifacts into the wasm target pack",
  "retry the MIR bridge without real target-loadable rustc-private root artifacts",
]
next_manifest = "bootstrap/compiler-payload-abi.toml"

