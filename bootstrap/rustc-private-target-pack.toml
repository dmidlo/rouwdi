status = "ready_bridge_context_attempted"
milestone_state = "bridge_wasm_mir_body_identity_emitted"
route_decision = "bridge_wasm_mir_body_identity_emitted"
exact_blocker = "The direct pack builder consumed this manifest and built the listed rustc-private closure for wasm32-wasip1 without invoking the stage2 wasm-host LLVM route. The real rouwdi-mir-adapter-probe bridge emitted `.rouwdi/direct-rustc-private-pack/target/wasm32-wasip1/release/rouwdi_mir_adapter_probe.wasm` (sha256 d65f56e879d64c24eea6825f032c15d099a3fcd15b8f69582c64e62907a2211a, 88464719 bytes) with ABI v1 exports. The loader instantiated that module, called ABI v1 exports, passed a valid MIR handoff input contract, created a real SourceMap, ParseSess, parser, and rustc_ast::ast::Crate, then created a real rustc_interface::Config, entered rustc_interface queries/global context/TyCtxt, and forced upstream HIR lowering by walking TyCtxt HIR items. It stops before TyCtxt::optimized_mir because the no-core fixture needs lang-item/core setup; it does not fabricate HIR, TyCtxt, Providers, Body<'tcx>, or MIR."
next_command = "Provide the payload fixture lang-item/core target-pack context after HIR lowering and providers registration so TyCtxt::optimized_mir can construct a real Body<'tcx> without aborting."

[upstream_context_handle_v1]
selected_strategy = "payload_owned_context"
owner = "payload"
scope = "payload-local"
refers_to = [
  "The current bridge execution owns a rustc_span::SourceMap and interned source file created from the MIR handoff source input.",
  "Future ParseSess, Session, Providers, TyCtxt, LocalDefId, and MIR Body objects must be created and retained inside the same payload Wasm instance.",
]
lifetime_rules = "Opaque handle values are valid only inside one payload Wasm instance and one execution epoch; they expire after the payload resets or the Wasm instance is dropped."
invalid_handle_behavior = "The payload returns invalid_input_contract or a precise context_handle_invalid/context_blocked error. It must not dereference, deserialize, or trust raw Rust pointers from ABI input."
proof_identity = "The handle proof identity is derived from the ABI manifest hash, payload artifact hash, source snapshot hash, compile_unit_id, source_path, and selected strategy; no raw address identity crosses the ABI."
opaque = true
serializable = false
may_cross_wasm_instance_boundaries = false
raw_pointers_allowed = false

[wasm_runtime_execution]
