exact_blocker = "The direct pack builder consumed this manifest and built the listed rustc-private closure for wasm32-wasip1 without invoking the stage2 wasm-host LLVM route. The real rouwdi-mir-adapter-probe bridge emitted `.rouwdi/direct-rustc-private-pack/target/wasm32-wasip1/release/rouwdi_mir_adapter_probe.wasm` (sha256 d6eeb372de7f547e524af263a432464fac9f33c106ea89349b64362c88fae687, 175274 bytes) with ABI v1 exports. The loader instantiated that module, called ABI v1 exports, passed a valid MIR handoff input contract, and the payload created a real rustc_span::SourceMap/source-file context before blocking at rustc_parse/ParseSess linkage. It does not fabricate TyCtxt, Providers, Body<'tcx>, or MIR."
